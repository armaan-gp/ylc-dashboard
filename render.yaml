services:
  - type: web
    name: ylc-dashboard
    runtime: python
    rootDir: backend
    buildCommand: |
      cd ../frontend && npm install && npm run build
      cp -r ../frontend/dist ./static_frontend
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PASSWORD_HASH
        sync: false
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
